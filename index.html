<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Countdown to June 16, 2026</title>

<!-- Bootstrap CDN -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background: linear-gradient(135deg,#1e3c72,#2a5298);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
}

.count-box{
    background:rgba(255,255,255,0.15);
    border-radius:12px;
    padding:20px;
}

.number{
    font-size:40px;
    font-weight:bold;
}

.label{
    font-size:14px;
}

</style>
</head>

<body>

<div class="container text-center">

<h2 class="mb-4">Countdown to June 16, 2026</h2>

<div class="row justify-content-center g-3">

<div class="col-6 col-md-3">
<div class="count-box">
<div id="days" class="number">0</div>
<div class="label">Days</div>
</div>
</div>

<div class="col-6 col-md-3">
<div class="count-box">
<div id="hours" class="number">0</div>
<div class="label">Hours</div>
</div>
</div>

<div class="col-6 col-md-3">
<div class="count-box">
<div id="minutes" class="number">0</div>
<div class="label">Minutes</div>
</div>
</div>

<div class="col-6 col-md-3">
<div class="count-box">
<div id="seconds" class="number">0</div>
<div class="label">Seconds</div>
</div>
</div>

</div>

</div>

<script>

const targetDate = new Date("June 16, 2026 00:00:00").getTime();

function updateCountdown(){

    const now = new Date().getTime();
    const distance = targetDate - now;

    const days = Math.floor(distance / (1000*60*60*24));
    const hours = Math.floor((distance % (1000*60*60*24)) / (1000*60*60));
    const minutes = Math.floor((distance % (1000*60*60)) / (1000*60));
    const seconds = Math.floor((distance % (1000*60)) / 1000);

    document.getElementById("days").innerHTML = days;
    document.getElementById("hours").innerHTML = hours;
    document.getElementById("minutes").innerHTML = minutes;
    document.getElementById("seconds").innerHTML = seconds;

    if(distance < 0){
        document.querySelector(".row").innerHTML = "<h3>The day has arrived!</h3>";
    }

}

updateCountdown();
setInterval(updateCountdown,1000);

</script>

</body>
</html>
